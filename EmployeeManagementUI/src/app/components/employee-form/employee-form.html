<div class="dashboard">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <span class="logo">👔 EMS Pro</span>
    </div>
    <div class="nav-right">
      <button class="btn btn-ghost" (click)="onCancel()">← Back</button>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="content">

    <div class="page-header">
      <h2>{{ isEditMode ? '✏️ Edit Employee' : '➕ Add New Employee' }}</h2>
      <p>{{ isEditMode ? 'Update employee details' : 'Fill in the details to add a new employee' }}</p>
    </div>

    <!-- ERROR -->
    <div class="error-message" *ngIf="errorMessage">
      ❌ {{ errorMessage }}
    </div>

    <!-- SUCCESS -->
    <div class="success-message" *ngIf="successMessage">
      ✅ {{ successMessage }}
    </div>

    <!-- FORM -->
    <div class="form-card">

      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input
            type="text"
            [(ngModel)]="formData.name"
            placeholder="John Doe"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input
            type="email"
            [(ngModel)]="formData.email"
            placeholder="john@company.com"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Department *</label>
          <select [(ngModel)]="formData.department" class="form-input">
            <option value="">Select department</option>
            <option *ngFor="let dept of departments" [value]="dept">
              {{ dept }}
            </option>
          </select>
        </div>
        <div class="form-group">
          <label>Role *</label>
          <input
            type="text"
            [(ngModel)]="formData.role"
            placeholder="Software Engineer"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Salary (₹) *</label>
          <input
            type="number"
            [(ngModel)]="formData.salary"
            placeholder="75000"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="formData.status" class="form-input">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-ghost" (click)="onCancel()">Cancel</button>
        <button
          class="btn btn-primary"
          (click)="onSubmit()"
          [disabled]="loading">
          {{ loading ? 'Saving...' : isEditMode ? 'Update Employee' : 'Create Employee' }}
        </button>
      </div>

    </div>
  </div>
</div>
